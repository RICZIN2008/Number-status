<!DOCTYPE html>
<html>
<head>
    <title>Blood Red Ban Checker</title>
    <style>
        /* Blood red theme */
        :root {
            --blood-red: #a50000;
            --dark-red: #8B0000;
            --light-red: #ffdddd;
            --white: #ffffff;
            --black: #000000;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--blood-red);
            color: var(--white);
            margin: 0;
            padding: 20px;
        }
        
        .dashboard {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        
        h1 {
            text-align: center;
            color: var(--light-red);
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            margin-bottom: 30px;
        }
        
        .input-group {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        input[type="text"] {
            width: 400px;
            padding: 15px;
            border: none;
            border-radius: 5px 0 0 5px;
            font-size: 18px;
            background-color: rgba(255, 255, 255, 0.2);
            color: var(--white);
        }
        
        button {
            padding: 15px 25px;
            border: none;
            border-radius: 0 5px 5px 0;
            background-color: var(--dark-red);
            color: var(--white);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background-color: var(--light-red);
            transform: scale(1.05);
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        .banned {
            background-color: rgba(255, 0, 0, 0.3);
            border: 2px solid var(--light-red);
            color: var(--light-red);
        }
        
        .allowed {
            background-color: rgba(0, 255, 0, 0.3);
            border: 2px solid #00ff00;
            color: #00ff00;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>BLOOD RED BAN CHECKER</h1>
        
        <div class="input-group">
            <input type="text" id="phoneNumber" placeholder="+1234567890 - Enter phone number">
            <button onclick="checkBanStatus()">CHECK STATUS</button>
        </div>
        
        <div id="result" class="result" style="display:none;"></div>
    </div>

    <script>
        function checkBanStatus() {
            const phoneNumber = document.getElementById('phoneNumber').value;
            const resultDiv = document.getElementById('result');
            
            // Reset previous results
            resultDiv.style.display = "none";
            
            // Validate phone number format
            const match = phoneNumber.match(/^\+(\d{3,4})/);
            if (!match) {
                resultDiv.innerHTML = "INVALID PHONE NUMBER FORMAT!";
                resultDiv.className = "result banned";
                resultDiv.style.display = "block";
                return;
            }
            
            const countryCode = match[1];
            let statusMessage = "";
            let className = "";
            
            // Enhanced banned countries list with additional validation
            const bannedCountries = [
                '33', '49', '86', '91', '55', '81', '39', '44'
            ];
            
            if (bannedCountries.includes(countryCode)) {
                statusMessage = `🚨 BANNED! 🚨`;
                className = "banned";
            } else {
                statusMessage = `✅ ALLOWED ✅`;
                className = "allowed";
            }
            
            // Add detailed information
            statusMessage += `<br><small>Country Code: ${countryCode}</small>`;
            
            resultDiv.innerHTML = statusMessage;
            resultDiv.className = `result ${className}`;
            resultDiv.style.display = "block";
        }
    </script>
</body>
</html>
