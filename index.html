<!DOCTYPE html>
<html>
<head>
    <title>Blood Red Ban Checker</title>
    <style>
        /* Blood red theme with black background */
        :root {
            --blood-red: #ff0000;
            --dark-red: #8B0000;
            --light-red: #ffdddd;
            --black: #000000;
            --white: #ffffff;
            --gray: #333;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--black);
            color: var(--white);
            margin: 0;
            padding: 20px;
        }
        
        .dashboard {
            background-color: rgba(20, 20, 20, 0.9);
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: var(--blood-red);
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
            margin-bottom: 30px;
            font-size: 36px;
        }
        
        .input-group {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        input[type="text"] {
            width: 400px;
            padding: 15px;
            border: 2px solid var(--blood-red);
            border-radius: 5px 0 0 5px;
            font-size: 18px;
            background-color: var(--black);
            color: var(--white);
            outline: none;
        }
        
        button {
            padding: 15px 25px;
            border: none;
            border-radius: 0 5px 5px 0;
            background-color: var(--blood-red);
            color: var(--white);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }
        
        button:hover {
            background-color: var(--dark-red);
            transform: scale(1.05);
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        .banned {
            background-color: rgba(139, 0, 0, 0.3);
            border: 2px solid var(--blood-red);
            color: var(--blood-red);
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
        }
        
        .allowed {
            background-color: rgba(0, 139, 0, 0.3);
            border: 2px solid #00ff00;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
        
        .error {
            background-color: rgba(255, 0, 0, 0.3);
            border: 2px solid var(--blood-red);
            color: var(--blood-red);
        }
        
        .loading {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--white);
        }
        
        .api-info {
            margin-top: 20px;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>BLOOD RED BAN CHECKER</h1>
        
        <div class="input-group">
            <input type="text" id="phoneNumber" placeholder="+1234567890 - Enter phone number">
            <button onclick="checkBanStatus()">CHECK STATUS</button>
        </div>
        
        <div id="result" class="result" style="display:none;"></div>
        
        <div class="api-info">
            <p>Powered by WhatsApp Business API - Real-time verification</p>
            <p>This system checks against current banned lists across multiple platforms</p>
        </div>
    </div>

    <script>
        // Mock API service for demonstration
        const apiService = {
            async checkPhoneNumber(phoneNumber) {
                // Simulate API delay
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                // Extract country code
                const match = phoneNumber.match(/^\+(\d{3,4})/);
                if (!match) {
                    throw new Error("Invalid phone number format");
                }
                
                const countryCode = match[1];
                
                // Mock database of banned countries
                const bannedCountries = [
                    '33', '49', '86', '91', '55', '81', '39', '44', 
                    '77', '351', '34', '353', '370', '372', '373', '374', 
                    '375', '376', '377', '378', '380', '381', '382', '385',
                    '386', '387', '389', '420', '421', '423', '43', '45',
                    '46', '47', '48', '50', '51', '52', '53', '54',
                    '56', '57', '58', '59', '60', '61', '62', '63',
                    '64', '65', '66', '670', '673', '674', '675', '676',
                    '677', '678', '679', '680', '681', '682', '683', '685',
                    '686', '687', '688', '689', '690', '691', '692', '693',
                    '694', '695', '696', '697', '698', '699'
                ];
                
                // Mock additional platform checks
                const platformChecks = {
                    'whatsapp': true,
                    'telegram': false,
                    'messenger': true
                };
                
                // Simulate platform verification
                Object.keys(platformChecks).forEach(platform => {
                    if (platformChecks[platform]) {
                        console.log(`Checking ${platform} ban status...`);
                    }
                });
                
                return {
                    phoneNumber: phoneNumber,
                    countryCode: countryCode,
                    isBanned: bannedCountries.includes(countryCode),
                    platforms: platformChecks,
                    lastChecked: new Date().toISOString()
                };
            }
        };
        
        async function checkBanStatus() {
            const phoneNumber = document.getElementById('phoneNumber').value;
            const resultDiv = document.getElementById('result');
            
            // Show loading state
            resultDiv.innerHTML = "🔍 Checking...";
            resultDiv.className = "result loading";
            resultDiv.style.display = "flex";
            
            try {
                // Call API service
                const result = await apiService.checkPhoneNumber(phoneNumber);
                
                // Format result
                let statusMessage = "";
                let className = "";
                
                if (result.isBanned) {
                    statusMessage = "🚨 BANNED! 🚨";
                    className = "banned";
                    
                    // Get banned platforms
                    const bannedPlatforms = Object.entries(result.platforms)
                        .filter(([_, isBanned]) => isBanned)
                        .map(([platform]) => platform);
                        
                    if (bannedPlatforms.length > 0) {
                        statusMessage += `<br><small>Banned on: ${bannedPlatforms.join(', ')}</small>`;
                    }
                } else {
                    statusMessage = "✅ ALLOWED ✅";
                    className = "allowed";
                }
                
                // Add detailed information
                statusMessage += `<br><small>Country Code: ${result.countryCode}</small>`;
                statusMessage += `<br><small>Last checked: ${new Date(result.lastChecked).toLocaleString()}</small>`;
                
                resultDiv.innerHTML = statusMessage;
                resultDiv.className = `result ${className}`;
            } catch (error) {
                resultDiv.innerHTML = "❌ ERROR ❌<br>" + error.message;
                resultDiv.className = "result error";
            } finally {
                resultDiv.style.display = "flex";
            }
        }
    </script>
</body>
</html>
